                  label:
                    fr: Secteur(s) couvert(s)
                - type: inline
                  components:
                    - name: DatePL
                      type: date
                      label:
                        fr: Date de dépôt
                      validations:
                        before: '2026-04-01'
                        after: '2025-03-31'
                    - name: ImpactPL
                      type: montant
                      tooltip:
                        text:
                          fr: Inscrivez l'estimation des économies récurrentes pour les entreprises découlant des mesures du projet de loi.
