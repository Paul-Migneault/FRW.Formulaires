          components:
            - name: AutreOuiNon
              type: radio
              label: 
                fr: Votre organisation a-t-elle mis en oeuvre des mesures d'allègement réglementaire, d'allègement administratif ou de prestation électronique de service en dehors du Plan d'action gouvernental en allègement et des projets de loi omnibus en allègement du MEIE durant la période du 1er avril 2025 au 31 mars 2026?
              options: 
                Oui: Oui
                Non: Non
            - type: dynamic
              v-if: val('AutreOuiNon') === 'Oui'
              tag: div
              text:
                fr: "<p>Veuillez inscrire ci-dessous toutes les autres mesures d'allègement réglementaire, d'allègement administratif et de prestation électronique mises en oeuvre par votre ministère ou organisme durant la période du 1er avril 2025 au 31 mars 2026.</p><br>"
            - name: AutresMesures
              type: repeatableGroup
              repeatable: true
              v-if: val('AutreOuiNon') === 'Oui'
              validations:
                optional: null
              label:
                fr: Autres mesures d'allègement
              instanceLabel:
                fr: Mesure
              addLabel:
                fr: Ajouter une mesure
              removeLabel:
                fr: Supprimer cette mesure
              limit: 30
              components:
                - name: NomAutreMesure
                  type: text
                  tooltip:
                    text:
                      fr: Nommez la nouvelle mesure d'allègement réglementaire ou administratif ou bien le service dont la prestation peut désormais se faire électroniquement.
                  label:
                    fr: Nom de la mesure
                - name: TypeAutreMesure
                  type: listeDeroulante
                  label:
                    fr: Type de mesure
                  options:
                    Reg: Allègement réglementaire
                    Adm: Allègement administratif
                    PES: Prestation électronique de service
                - name: RésultatsAutreMesure
                  type: textarea
                  tooltip:
                    text:
                      fr: Expliquez ici comment cette mesure s'est concrétisée, que ce soit par de nouveaux règlements, procédures ou systèmes.
                  label:
                    fr: Résultats
                - name: DateAutreMesure
                  type: date
                  label:
                    fr: Date de mise en place
                  validations:
                    before: '2026-04-01'
                    after: '2025-03-31'
                - name: ImpactAutreMesure
                  type: listeDeroulante
                  tooltip:
                    text:
                      fr: Utilisez la liste déroulante pour indiquer le principal impact positif pour les entreprises.
                  label: 
                    fr: Principal impact sur les entreprises
                  options:
                    Temps: Réduction du temps passé à remplir formalités
                    Nombre: Réduction du nombre de formalités
                    Fréquence: Réduction de la fréquence de formalités
                    Coût: Réduction des coûts de conformité
                    Délais: Réduction des délais
                    Clarté: Augmentation de la clarté
                    Flexibilité: Plus de flexibilité
                    Structurant:
                    Autre: Autre (spécifier dans les Résultats) 
