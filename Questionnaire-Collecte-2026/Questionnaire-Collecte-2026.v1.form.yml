# yaml-language-server: $schema=https://formulaires.it.mtess.gouv.qc.ca/api/v1/SIS/ObtenirSchema/form
# debug: langue=fr, showAll=false
config:
  securite: 
    accesAnonyme: true 
    
form:
  title:
    fr: Questionnaire de collecte d'information aux fins de l'édition 2026 du Rapport sur la réglementation intelligente et les mesures gouvernementales d'allègement réglementaire et administratif
  sectionsGroup:
    - sections:
        - section: 
            fr: Démarrage du questionnaire
          id: select
          components:
            - name: MO
              tooltip:
                text:
                  fr: 
                    <p>Avant de débuter le questionnaire, il est important d'identifier votre ministère ou organisme. Cela permettra d'afficher seulement les questions qui vous sont pertinentes dans les différentes sections du questionnaire.</p>
              label:
                fr: Sélectionnez votre ministère/organisme
              type: listeDeroulante
              options: 
                AMF:
                AMP:
                BANQ:
                CCQ:
                CNESST:
                CTQ:
                MAMH:
                MAPAQ:
                MCC:
                MEIE:
                MELCCFP:
                MEQ:
                MES:
                MESS:
                MFA:
                MFQ:
                MIFI:
                MJQ:
                MLF:
                MRNF:
                MSP:
                MSSS:
                MTMD:
                MTO:
                MTRAV:
                OPC:
                OQLF:
                RACJ:
                RAMQ:
                RBQ:
                Retraite: Retraite Québec
                RMAAQ:
                RQ:
                SAAQ:
                SCT:
                SRIDAIL:
                TAL:

        - section: 
           fr: Politique gouvernementale en allègement réglementaire et administratif
          id: politique
          cacherTexteExplicatifChampsObligatoires: true          
          components:
            - type: dynamic
              tag: div
              text: 
                fr: <p>La période couverte pour cette section est du 1er avril 2025 au 31 mars 2026.</p><br>
            - name: 1pour1
              type: radio
              tooltip:
                text:
                  fr:  <p>En vertu de l'article 8 de la Politique gouvernementale sur l'allègement réglementaire et administratif, tout ministère ou organisme visé qui propose l’adoption d’une nouvelle formalité administrative doit, au même moment, proposer d’abolir une formalité administrative existante dont le coût pour les entreprises est équivalent.</p>
              v-if: val('MO') === 'Test' || val('MO') === 'AMF' || val('MO') === 'AMP' || val('MO') === 'CCQ' || val('MO') === 'CNESST' || val('MO') === 'CTQ' || val('MO') === 'MAPAQ' || val('MO') === 'MCC' || val('MO') === 'MELCCFP' || val('MO') === 'MEIE' || val('MO') === 'MESS' || val('MO') === 'MFA' || val('MO') === 'MRNF' || val('MO') === 'OPC' || val('MO') === 'RACJ' || val('MO') === 'RBQ' || val('MO') === 'RMAAQ' || val('MO') === 'RQ' || val('MO') === 'SAAQ'
              label: 
                fr: Votre organisation a-t-elle ajouté et retiré des formalités dans le cadre de la règle du «un pour un»?
              options: 
                Oui: Oui
                Non: Non
            - name: Formalités
              v-if: val('1pour1') === 'Oui'
              type: repeatableGroup
              repeatable: true
              label:
                fr: Formalités ajoutées et retirées dans le cadre de la règle du 1 pour 1
              instanceLabel:
                fr: Dossier
              addLabel:
                fr: Ajouter un dossier
              removeLabel:
                fr: Supprimer ce dossier
              limit: 30
              min: 1
              components:
                - type: inline
                  components:
                  - name: NombreFormAjout
                    type: number
                    label:
                      fr: Nombre de formalités ajoutées
                  - name: NombreFormRetire
                    type: number
                    label:
                      fr: Nombre de formalités retirées
                - type: inline
                  components:
                  - name: CoutFormAjout
                    type: montant
                    label:
                      fr: Coût des formalités ajoutées
                  - name: CoutFormRetire
                    type: montant
                    label:
                      fr: Coût des formalités retirées
                - name: dossdec
                  type: text
                  label:
                    fr: Numéro DOSSDEC
                  validations:
                      optional: null
                - name: descFormalités
                  type: textarea
                  tooltip: 
                    text:
                      fr: Veuillez nommer les formalités touchées par la règle du «un pour un» et indiquer le contexte (projet de loi, de règlement, etc.)
                  label:
                    fr: Détails
            - name: AIR
              type: radio
              v-if: val('MO') === 'Test' || val('MO') === 'AMF' || val('MO') === 'AMP' || val('MO') === 'BANQ' || val('MO') === 'CCQ' || val('MO') === 'CNESST' || val('MO') === 'MAMH' || val('MO') === 'MAPAQ' || val('MO') === 'MCC' || val('MO') === 'MELCCFP' || val('MO') === 'MEIE' || val('MO') === 'MEQ' || val('MO') === 'MES' || val('MO') === 'MESS' || val('MO') === 'MFA' || val('MO') === 'MFQ' || val('MO') === 'MIFI' || val('MO') === 'MJQ' || val('MO') === 'MLF' || val('MO') === 'MRNF' || val('MO') === 'MSP' || val('MO') === 'MSSS' || val('MO') === 'MTO' || val('MO') === 'MTMD' || val('MO') === 'MTRAV' || val('MO') === 'OPC' || val('MO') === 'RACJ' || val('MO') === 'RAMQ' || val('MO') === 'RBQ' || val('MO') === 'Retraite' || val('MO') === 'RMAAQ' || val('MO') === 'RQ' || val('MO') === 'SAAQ' || val('MO') === 'SCT' || val('MO') === 'SRIDAIL' || val('MO') === 'TAL'
              tooltip:
                text:
                  fr: En vertu des articles 17 à 19 de la Politique, tout projet pouvant potentiellement avoir un impact sur les entreprises doit être accompagné d'une analyse d'impact réglementaire (AIR).
              label: 
                fr: La liste des dossiers faisant l'objet d'une analyse d'impact réglementaire (fournie par le MEIE avec ce questionnaire) est-elle exacte et exhaustive?
              options: 
                Oui: Oui
                Non: Non
            - name: AIRexp
              type: textarea
              v-if: val('AIR') === 'Non'
              label: 
                fr: Veuillez indiquer les dossiers manquants ou en trop dans la liste.
            - name: Formulaires
              type: radio
              tooltip:
                text:
                  fr: En vertu de l'article 22 de la Politique, tout ministère ou organisme doit publier au préalable, sur son site Web, tout projet de nouveau formulaire s'adressant aux entreprises pour une période de 30 jours afin de recueillir les commentaires des intervenants dans les secteurs d’activité économique concernés.
              label: 
                fr: Votre organisation a-t-elle introduit de nouveaux formulaires lors de la période visée?
              options: 
                Oui: Oui
                Non: Non
            - name: FormulairesDétail
              v-if: val('Formulaires') === 'Oui'
              type: repeatableGroup
              repeatable: true
              validations:
                optional: null
              label:
                fr: Formulaires introduits
              instanceLabel:
                fr: Formulaire
              addLabel:
                fr: Ajouter un formulaire
              removeLabel:
                fr: Supprimer ce formulaire
              limit: 30
              components:
                - name: NomFormulaire
                  type: text
                  label:
                    fr: Nom du formulaire créé
                - name: Prépub
                  type: radio
                  label:
                    fr: A-t-il été prépublié sur le web?
                  options: 
                    Oui: Oui
                    Non: Non
            - name: Mécanisme
              type: radio
              tooltip:
                text:
                  fr: En vertu des articles 28 et 29 de la Politique, les ministères et organismes responsables de l’élaboration des règles qui ont des impacts sur les entreprises ou qui concernent les entreprises doivent se doter d’un mécanisme de révision de ces règles.
              label: 
                fr: Votre organisation a-t-elle un mécanisme de révision des règles à jour?
              options: 
                Oui: Oui
                Non: Non
            - name: MécanismeNombre
              type: number
              label:
                fr: Nombre de lois et règlements révisés avec le mécanisme de révision dans la période
              v-if: val('Mécanisme') === 'Oui'
