                fr: "<p>Cette section vise à recenser les projets de loi principalement composés de mesures d'allègement, mais qui n'ont pas été portés par le MEIE. Le projet doit avoir été déposé entre le 1er avril 2025 et le 31 mars 2026.</p><br>"
